[build]
rustc-wrapper = "sccache"
jobs = 6

# Disable incremental compilation to enable sccache caching across worktrees.
# Incremental builds are per-target-directory and can't be cached by sccache.
[env]
CARGO_INCREMENTAL = "0"
SCCACHE_CACHE_SIZE = "20G"
SCCACHE_DIR = "/tmp/sccache"
LIBSQLITE3_SYS_USE_PKG_CONFIG = "1"

[alias]
ork = "run -p orkestra-cli --"
