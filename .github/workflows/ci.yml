name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  SERVICE_IMAGE: ${{ github.repository_owner }}/orkestra/service

jobs:
  # ============================================================================
  # Rust backend: formatting, lints, and tests
  # ============================================================================
  rust:
    name: Rust
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # Keep in sync with .devcontainer/Dockerfile (Tauri build deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Set up pnpm
        # Required by ork-service build.rs which runs pnpm build --mode service
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        # Tauri proc macro (generate_context!) requires dist/ to exist at compile time
        run: pnpm build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

  # ============================================================================
  # Frontend: formatting, lints, tests, and dead code detection
  # ============================================================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:run

      - name: Dead code detection
        run: pnpm knip

  # ============================================================================
  # Deploy service to Dokploy on every passing main push
  # ============================================================================
  deploy-service:
    name: Deploy Service
    needs: [rust, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: benbristow/dokploy-deploy-action@0.2.2
        with:
          api_token: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          application_id: ${{ secrets.DOKPLOY_APPLICATION_ID }}
          dokploy_url: ${{ secrets.DOKPLOY_URL }}
          service_type: application

  # ============================================================================
  # Resolve the release tag — skipped if this commit isn't tagged
  # ============================================================================
  resolve-tag:
    name: Resolve Tag
    needs: [rust, frontend]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Get release tag
        id: get-tag
        run: |
          TAG=$(git tag --points-at HEAD | grep '^v' | head -1)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

  # ============================================================================
  # Build macOS universal app + ork CLI → GitHub Release
  # ============================================================================
  build-macos:
    name: Build macOS App
    needs: resolve-tag
    if: needs.resolve-tag.outputs.tag != ''
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build ork CLI (universal)
        run: |
          cargo build --release -p orkestra-cli --target aarch64-apple-darwin
          cargo build --release -p orkestra-cli --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/ork \
            target/x86_64-apple-darwin/release/ork \
            -output target/release/ork

      - name: Build and bundle Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.resolve-tag.outputs.tag }}
          releaseName: Orkestra ${{ needs.resolve-tag.outputs.tag }}
          releaseBody: |
            ## Installation

            **macOS**: Download the `.dmg`, open it, drag Orkestra to Applications.

            > **Note**: The app is not yet code-signed. On first launch, right-click → Open to bypass Gatekeeper.

            After opening the app, use **Help → Install 'ork' CLI tool** to make the `ork` command available in your terminal.
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

  # ============================================================================
  # Build service Docker image → GitHub Container Registry
  # ============================================================================
  publish-service-image:
    name: Publish Service Image
    needs: resolve-tag
    if: needs.resolve-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set short commit hash
        run: echo "COMMIT_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and push service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.SERVICE_IMAGE }}:${{ needs.resolve-tag.outputs.tag }}
          build-args: |
            COMMIT_HASH=${{ env.COMMIT_SHORT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
