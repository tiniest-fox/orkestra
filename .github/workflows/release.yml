name: Release

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  SERVICE_IMAGE: ${{ github.repository_owner }}/orkestra/service

jobs:
  # ============================================================================
  # Build macOS universal app + ork CLI → GitHub Release
  # ============================================================================
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build ork CLI (universal)
        run: |
          cargo build --release -p orkestra-cli --target aarch64-apple-darwin
          cargo build --release -p orkestra-cli --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/ork \
            target/x86_64-apple-darwin/release/ork \
            -output target/release/ork

      - name: Build and bundle Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Orkestra ${{ github.ref_name }}
          releaseBody: |
            ## Installation

            **macOS**: Download the `.dmg`, open it, drag Orkestra to Applications.

            > **Note**: The app is not yet code-signed. On first launch, right-click → Open to bypass Gatekeeper.

            After opening the app, use **Help → Install 'ork' CLI tool** to make the `ork` command available in your terminal.
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

  # ============================================================================
  # Build service Docker image → GitHub Container Registry
  # ============================================================================
  publish-service-image:
    name: Publish Service Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.SERVICE_IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
