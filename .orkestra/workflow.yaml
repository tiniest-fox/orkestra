# Custom workflow for Orkestra development
#
# Based on the default workflow, but adds an automated checks stage
# between work and review to run linting, tests, and type checking.

version: 1

stages:
  # Planning: Creates implementation plan, can ask clarifying questions
  - name: planning
    display_name: Planning
    artifact: plan
    prompt: planner.md
    capabilities:
      ask_questions: true

  # Breakdown: Decomposes complex tasks into subtasks with dependencies
  - name: breakdown
    display_name: Breaking Down
    artifact: breakdown
    inputs: [plan]
    prompt: breakdown.md
    capabilities:
      produce_subtasks: true

  # Work: Implements the approved plan
  - name: work
    display_name: Working
    artifact: summary
    inputs: [plan, breakdown]
    prompt: worker.md

  # Checks: Automated quality gates (lint, test, type check)
  # Runs in the task's worktree, detects what changed, runs relevant checks
  - name: checks
    display_name: Automated Checks
    artifact: check_results
    inputs: [summary]
    script:
      command: .orkestra/scripts/checks.sh
      timeout_seconds: 600 # 10 minutes for full test suite
      on_failure: work # Return to work stage if checks fail

  # Review: Automated review that can send back to work if needed
  - name: review
    display_name: Reviewing
    artifact: verdict
    inputs: [plan, summary, check_results]
    prompt: reviewer.md
    capabilities:
      supports_restage: [work]
    is_automated: true

  # Compound: Captures learnings and updates documentation
  # Reviews worker notes and reviewer observations, documents anything useful
  - name: compound
    display_name: Compounding
    artifact: learnings
    inputs: [summary, verdict]
    prompt: compound.md
    is_automated: true

flows:
  # Quick flow: Skip breakdown and compound stages for smaller tasks
  quick:
    description: Skip planning breakdown for simple, well-defined tasks
    icon: zap
    stages:
      - planning
      - work
      - checks
      - review:
          capabilities:
            supports_restage: [work]

  # Hotfix flow: Straight to work, minimal overhead
  hotfix:
    description: Emergency fix — skip straight to implementation
    icon: rocket
    stages:
      - work
      - checks
      - review:
          capabilities:
            supports_restage: [work]

integration:
  on_failure: work
