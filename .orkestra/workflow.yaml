# Custom workflow for Orkestra development
#
# Flows define complete pipelines. YAML anchors (&name / *name)
# share identical stages across flows without duplication.

version: 2

flows:
  default:
    stages:
      - name: plan
        description: Produces a high-level implementation plan for the feature
        artifact: plan
        prompt: planner.md
        model: opus

      - name: task
        description: Breaks down the plan into actionable subtasks with technical and implementation guidance
        artifact: breakdown
        prompt: breakdown.md
        model: opus
        capabilities:
          subtasks:
            flow: hotfix

      - &work_stage
        name: work
        description: Implements the approved plan and produces a work summary
        artifact: summary
        prompt: worker.md
        model: sonnet
        gate:
          command: "$ORKESTRA_PROJECT_ROOT/.orkestra/scripts/checks.sh"
          timeout_seconds: 1200
        disallowed_tools:
          - pattern: "Bash(*cargo test*)"
            message: "Testing runs automatically in the gate after you complete your work"
          - pattern: "Bash(*cargo build*)"
            message: "Building is handled by the gate that runs after you complete your work"
          - pattern: "Bash(*cargo clippy*)"
            message: "Linting runs automatically in the gate after you complete your work"
          - pattern: "Bash(*cargo fmt*)"
            message: "Formatting runs automatically in the gate after you complete your work"
          - pattern: "Bash(pnpm tauri*)"
            message: "Never run the app — it spawns nested agent processes and causes errors"
          - pattern: "Bash(pnpm dev*)"
            message: "Never run the app dev server — it's not needed for implementation"
          - pattern: "Bash(*cargo run*)"
            message: "Never run the app binary — it spawns nested agent processes and causes errors"

      - name: review
        description: Reviews completed work and produces an approval or rejection verdict
        artifact: verdict
        prompt: reviewer.md
        model: opus
        disallowed_tools:
          - pattern: "Bash(*cargo *)"
            message: "All automated checks have passed and all tests pass as-is — focus on code review, not re-running checks"
        gate: true

      - &compound_stage
        name: compound
        description: Captures key learnings and produces updated documentation
        artifact: learnings
        prompt: compound.md
        model: sonnet

    integration:
      on_failure: task

  quick:
    stages:
      - name: plan
        description: Produces a high-level implementation plan for the feature
        artifact: plan
        prompt: quick_planner.md
        model: opus
      - *work_stage
      - name: review
        description: Reviews completed work and produces an approval or rejection verdict
        artifact: verdict
        prompt: reviewer.md
        model: opus
        gate: true
      - *compound_stage
    integration:
      on_failure: work

  hotfix:
    stages:
      - name: work
        description: Implements the approved plan and produces a work summary
        artifact: summary
        prompt: worker.md
        model: sonnet
        gate:
          command: "$ORKESTRA_PROJECT_ROOT/.orkestra/scripts/checks-lite.sh"
          timeout_seconds: 1200
        disallowed_tools:
          - pattern: "Bash(*cargo test*)"
            message: "Testing runs automatically in the gate after you complete your work"
          - pattern: "Bash(*cargo build*)"
            message: "Building is handled by the gate that runs after you complete your work"
          - pattern: "Bash(*cargo clippy*)"
            message: "Linting runs automatically in the gate after you complete your work"
          - pattern: "Bash(*cargo fmt*)"
            message: "Formatting runs automatically in the gate after you complete your work"
          - pattern: "Bash(pnpm tauri*)"
            message: "Never run the app — it spawns nested agent processes and causes errors"
          - pattern: "Bash(pnpm dev*)"
            message: "Never run the app dev server — it's not needed for implementation"
          - pattern: "Bash(*cargo run*)"
            message: "Never run the app binary — it spawns nested agent processes and causes errors"
      - name: review
        description: Reviews completed work and produces an approval or rejection verdict
        artifact: verdict
        prompt: subtask-reviewer.md
        model: opus
        gate: true
    integration:
      on_failure: work

  micro:
    stages:
      - name: work
        description: Implements the approved plan and produces a work summary
        artifact: summary
        prompt: worker.md
        model: sonnet
        gate:
          command: "$ORKESTRA_PROJECT_ROOT/.orkestra/scripts/checks-lite.sh"
          timeout_seconds: 1200
    integration:
      on_failure: work

  prompt-iteration:
    stages:
      - name: requirements
        description: Gathers requirements about what to change in the prompt and why, researches best practices
        artifact: requirements
        prompt: prompt_requirements.md
        model: opus

      - name: write
        description: Implements the prompt changes based on the requirements
        artifact: summary
        prompt: prompt_writer.md
        model: sonnet

      - name: review
        description: Reviews the revised prompt for consistency, coverage, and prompt engineering best practices
        artifact: verdict
        prompt: prompt_reviewer.md
        model: opus
        gate: true
    integration:
      on_failure: write

  # Docs pipeline: research → write → edit → compound.
  # Use this flow for documenting features, APIs, and concepts.
  # The research stage explores the codebase and produces a structured analysis.
  # The write stage authors MDX docs in docs/src/content/docs/. The edit stage
  # reviews for accuracy, writing quality, and style before approving or rejecting.
  docs:
    stages:
      # Research: explore the codebase and produce a structured analysis.
      # Read-only. Ask clarifying questions to scope the document first.
      - name: research
        description: Explores the codebase and produces a detailed analysis to guide documentation
        artifact: analysis
        prompt: researcher.md
        model: opus
        disallowed_tools:
          - pattern: "Edit"
            message: "Research is read-only — explore and document findings, don't modify files"
          - pattern: "Write"
            message: "Research is read-only — explore and document findings, don't modify files"

      # Write: author MDX documentation from the research analysis.
      # Gate runs docs checks to catch lint/type errors before the edit stage.
      - name: write
        description: Authors MDX documentation in docs/src/content/docs/ based on the research analysis
        artifact: draft
        prompt: writer.md
        model: sonnet
        gate:
          command: "$ORKESTRA_PROJECT_ROOT/.orkestra/scripts/checks-docs.sh"
          timeout_seconds: 300

      # Edit: review documentation for accuracy, writing quality, and style.
      # On rejection, sends the Trak back to the write stage with feedback.
      - name: edit
        description: Reviews documentation for technical accuracy, writing quality, and style adherence
        artifact: verdict
        prompt: editor.md
        model: opus
        gate: true
        disallowed_tools:
          - pattern: "Edit"
            message: "Editor is read-only — use approve or reject to provide feedback"
          - pattern: "Write"
            message: "Editor is read-only — use approve or reject to provide feedback"

      # Compound: capture improvements to editorial guidelines and agent prompts.
      # Runs automatically after a doc is approved.
      - name: compound
        description: Captures learnings from the completed Trak to improve future documentation work
        artifact: learnings
        prompt: compound-docs.md
        model: sonnet

    integration:
      on_failure: write

  # Component pipeline: spec → build → review.
  # Use this flow when a validated component request needs to be built.
  # The spec stage defines the component's purpose, props, and design.
  # The build stage implements it as an Astro component in docs/src/components/docs/.
  # The review stage checks correctness, design system adherence, and usage docs.
  component:
    stages:
      - name: spec
        description: Defines the component's purpose, props, visual design, and usage examples based on the request
        artifact: spec
        prompt: planner.md
        model: opus

      - name: build
        description: Implements the Astro component and updates docs/editorial/components.md
        artifact: summary
        prompt: worker.md
        model: sonnet
        gate:
          command: "$ORKESTRA_PROJECT_ROOT/.orkestra/scripts/checks-docs.sh"
          timeout_seconds: 300

      - name: review
        description: Reviews the component for correctness, design system adherence, and documentation quality
        artifact: verdict
        prompt: reviewer.md
        model: opus
        gate: true

    integration:
      on_failure: build

  opencode:
    stages:
      - name: think
        description: Thinks about the user's query, asks questions and returns thoughts on what to do
        artifact: thoughts
        prompt: thinking.md
        model: opencode-go/kimi-k2.6

      - name: execute
        description: Executes on the pre-generated thoughts and produce an executive summary
        artifact: executive_summary
        prompt: execute.md
        model: opencode-go/kimi-k2.6

    integration:
      on_failure: think
