[package]
name = "orkestra-core"
version = "0.1.0"
edition = "2021"

[lints]
workspace = true

[features]
default = []
# Enables test utilities for integration tests
testutil = ["dep:tempfile"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
dirs = "6"
libc = "0.2"
indexmap = { version = "2", features = ["serde"] }
thiserror = "1"
rusqlite = { version = "0.31", features = ["bundled"] }
git2 = "0.18"
tempfile = { version = "3", optional = true }
handlebars = "6"
once_cell = "1"

[dev-dependencies]
tempfile = "3"
orkestra-core = { path = ".", features = ["testutil"] }
