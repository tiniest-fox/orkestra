# Orkestra Workflow Configuration
# ================================
# Defines the stages a task passes through from creation to completion.
# Each stage runs an AI agent (with a prompt template) or a shell script.
#
# Stages execute in order. Each stage produces a named artifact.
# Artifacts from earlier stages are automatically available to later stages.
#
# Stages can have a gate: a shell script that runs after the agent completes.
# If the gate exits non-zero, the agent retries with the error output as feedback.

version: 1

stages:
  # Planning: understand what to build, ask clarifying questions.
  # Produces a requirements-level plan (not implementation details).
  - name: planning
    display_name: Planning
    description: Understand what to build, ask clarifying questions
    artifact:
      name: plan
      description: Implementation plan and approach for this task
    prompt: planner.md
    capabilities:
      ask_questions: true

  # Breakdown: research the codebase and split the plan into subtasks.
  # Subtasks are assigned to the "subtask" flow (work → review only).
  - name: breakdown
    display_name: Breaking Down
    description: Research the codebase and split the plan into subtasks
    artifact:
      name: breakdown
      description: Subtask breakdown with dependencies
    prompt: breakdown.md
    capabilities:
      subtasks:
        flow: subtask

  # Work: implement the code changes described by the plan.
  # The gate runs checks.sh after the agent completes. On failure, the agent retries.
  - name: work
    display_name: Working
    description: Implement the code changes described by the plan
    artifact:
      name: summary
      description: Summary of changes made and implementation notes
    prompt: worker.md
    gate:
      command: "$ORKESTRA_PROJECT_ROOT/.orkestra/scripts/checks.sh"
      timeout_seconds: 600

  # Review: check completed work, approve or reject with feedback.
  # On rejection, sends the task back to the work stage.
  - name: review
    display_name: Reviewing
    description: Check completed work, approve or reject with feedback
    artifact:
      name: verdict
      description: Review verdict and feedback
    prompt: reviewer.md
    capabilities:
      approval:
        rejection_stage: work

# Where to send the task when merging its branch fails (e.g., conflict).
integration:
  on_failure: work

# Flows: shortened pipelines for tasks that don't need every stage.
# Each flow lists a subset of the stages above.
flows:
  subtask:
    description: Simplified pipeline for subtasks (work → review)
    icon: git-branch
    stages:
      - work
      - review
