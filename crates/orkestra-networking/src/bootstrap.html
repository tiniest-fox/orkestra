<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orkestra Daemon</title>
<style>
body { font-family: system-ui, sans-serif; max-width: 480px; margin: 4rem auto; padding: 0 1rem; }
code { background: #f0f0f0; padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; }
button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
#code { font-size: 2rem; font-weight: bold; letter-spacing: 0.1em; margin-top: 1rem; }
</style>
</head>
<body>
<h1>Orkestra Daemon</h1>
<p>WebSocket URL: <code id="ws-url">{ws_url}</code></p>
<button onclick="generateCode()">Generate Pairing Code</button>
<div id="code"></div>
<script>
async function generateCode() {
  const res = await fetch('/pairing-code', { method: 'POST' });
  if (res.ok) {
    const data = await res.json();
    document.getElementById('code').textContent = data.code;
  } else {
    document.getElementById('code').textContent = 'Error: ' + res.status;
  }
}
</script>
</body>
</html>
