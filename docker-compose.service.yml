# Dokploy / Docker Compose config for the Orkestra service.
#
# Copy this to your server or point Dokploy at it.
# Set all required environment variables in Dokploy's UI (never commit secrets).

services:
  ork-service:
    build:
      context: .
      dockerfile: Dockerfile.service
    restart: unless-stopped
    ports:
      - "${SERVICE_PORT:-3847}:3847"
    environment:
      # --- Networking ---
      SERVICE_PORT: "${SERVICE_PORT:-3847}"

      # --- Claude auth: use ONE of these ---
      # Option A: API key (set this env var in Dokploy)
      # ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      # Option B: Subscription login — leave blank, run `docker compose exec ork-service claude login`
      #           once after first deploy. Credentials persist in the claude-config volume.

      # --- Optional: GitHub CLI auth (for PR creation) ---
      GH_TOKEN: "${GH_TOKEN:-}"

      # --- Logging ---
      RUST_LOG: "${RUST_LOG:-info}"

    volumes:
      # Claude credentials — persisted so subscription login survives restarts.
      # After first deploy: docker compose exec ork-service claude login
      - claude-config:/root/.claude

      # Service database — persisted so service.db survives container restarts
      - service-data:/data

      # Docker socket — required for devcontainer management
      - /var/run/docker.sock:/var/run/docker.sock

    healthcheck:
      # HTTP check — service is up when /health returns 200
      test: ["CMD", "curl", "-sf", "http://localhost:3847/health"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 120s

volumes:
  claude-config:
  service-data:
