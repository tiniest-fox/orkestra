<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mock D — Session Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: #E8E5EF;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 56px 24px 48px;
  gap: 20px;
}

/* Top bar */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 48px;
  background: rgba(232,229,239,0.95);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  border-bottom: 1px solid #CCC8D8;
  z-index: 100;
}

.topbar-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: #7B7490;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.scenario-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 100px;
  border: 1.5px solid #CCC8D8;
  color: #6B6279;
  cursor: pointer;
  background: transparent;
  transition: all 0.12s;
  letter-spacing: 0.04em;
}
.scenario-btn.active {
  background: #1C1820;
  border-color: #1C1820;
  color: white;
}
.scenario-btn:hover:not(.active) { border-color: #9D95AD; color: #3D3647; }

/* Drawer */
.drawer {
  width: 540px;
  background: #F9F8FC;
  border: 1px solid #DDD9E8;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(28,24,32,0.10), 0 1px 4px rgba(28,24,32,0.06);
  height: calc(100vh - 100px);
}

/* ── Header ── */
.drawer-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid #E2DEED;
  flex-shrink: 0;
}
.header-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.task-title {
  font-size: 14px;
  font-weight: 600;
  color: #1C1820;
  letter-spacing: -0.01em;
  line-height: 1.3;
}
.close-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  color: #9D95AD;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 1px;
}
.kbd {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: #9D95AD;
  border: 1px solid #CCC8D8;
  border-radius: 3px;
  padding: 1px 5px;
}

/* ── Session strip ── */
.strip-wrap {
  border-bottom: 1px solid #E2DEED;
  flex-shrink: 0;
  background: #F9F8FC;
  position: relative;
}

/* Scroll fade on right edge */
.strip-wrap::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 28px;
  background: linear-gradient(to right, transparent, #F9F8FC);
  pointer-events: none;
}

.strip {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.strip::-webkit-scrollbar { display: none; }

.chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1.5px solid transparent;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.1s;
}
.chip-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
}
.chip-glyph {
  font-size: 11px;
  line-height: 1;
}

/* Outcome styles */
.chip.done   .chip-name { color: #9D95AD; }
.chip.done   .chip-glyph { color: #9D95AD; }
.chip.done:hover { background: #F1EFF6; }

.chip.rejected .chip-name { color: #B4A4C0; }
.chip.rejected .chip-glyph { color: #DC2626; }
.chip.rejected:hover { background: #FFF5F5; }

.chip.current { background: var(--c); border-color: var(--c); }
.chip.current .chip-name { color: white; }
.chip.current .chip-glyph { color: rgba(255,255,255,0.75); }

/* Selected (past) */
.chip.done.sel    { background: #F1EFF6; border-color: var(--c); }
.chip.done.sel    .chip-name, .chip.done.sel .chip-glyph { color: var(--c); }
.chip.rejected.sel { background: #FFF5F5; border-color: #DC2626; }
.chip.rejected.sel .chip-name { color: #991B1B; }
.chip.rejected.sel .chip-glyph { color: #DC2626; }

.connector {
  width: 14px;
  height: 1.5px;
  background: #DDD9E8;
  flex-shrink: 0;
  margin-bottom: 6px; /* nudge down to align with chip center */
}

/* ── Context bar ── */
.ctx-bar {
  border-bottom: 1px solid #E2DEED;
  flex-shrink: 0;
  padding: 0 20px;
  height: 34px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
}
.ctx-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.ctx-stage { font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.ctx-meta { color: #9D95AD; }
.ctx-tag {
  font-size: 9px;
  font-weight: 600;
  border-radius: 3px;
  padding: 2px 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.ctx-tag.current { background: var(--c, #7C3AED); color: white; }
.ctx-tag.done    { background: #E8E4F2; color: #4A3F6B; }
.ctx-tag.rejected { background: #FEE2E2; color: #991B1B; }
.ctx-back {
  margin-left: auto;
  font-size: 10px;
  color: #9D95AD;
  cursor: pointer;
  text-decoration: underline;
}
.ctx-back:hover { color: #3D3647; }

/* ── Tabs ── */
.tabs {
  display: flex;
  height: 36px;
  border-bottom: 1px solid #E2DEED;
  flex-shrink: 0;
}
.tab {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #9D95AD;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.1s;
  user-select: none;
}
.tab:hover { background: #F1EFF6; color: #3D3647; }
.tab.on { color: var(--tc, #7C3AED); border-bottom-color: var(--tc, #7C3AED); font-weight: 500; }
.hk {
  font-size: 9px;
  border: 1px solid currentColor;
  border-radius: 3px;
  padding: 1px 3px;
  opacity: 0.5;
}

/* ── Body ── */
.body {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

/* Content types */
.prose {
  padding: 20px;
  font-size: 13px;
  line-height: 1.65;
  color: #1C1820;
}
.prose h3 {
  font-size: 13px;
  font-weight: 600;
  margin: 0 0 7px;
  color: #1C1820;
}
.prose h3 + * { margin-top: 0; }
.prose p { color: #3D3647; margin-bottom: 8px; }
.prose ul { padding-left: 18px; color: #3D3647; }
.prose li { margin-bottom: 4px; }
.prose .gap { margin-top: 16px; }
.prose code {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11.5px;
  background: #EAE7EF;
  border-radius: 3px;
  padding: 1px 5px;
  color: #4A3F6B;
}

.review-card {
  margin: 16px 20px;
  border: 1px solid #E2DEED;
  border-radius: 8px;
  overflow: hidden;
}
.review-verdict {
  padding: 9px 14px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.review-verdict.rej { background: #FFF5F5; color: #991B1B; border-bottom: 1px solid #FEE2E2; }
.review-verdict.app { background: #F0FDFB; color: #0F766E; border-bottom: 1px solid #CCFBF1; }
.review-verdict.pend { background: #F3EEFF; color: #5B21B6; border-bottom: 1px solid #DDD1F7; }
.review-body {
  padding: 12px 14px;
  font-size: 13px;
  color: #3D3647;
  line-height: 1.6;
}
.review-meta {
  padding: 8px 14px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: #9D95AD;
  background: #F9F8FC;
  border-top: 1px solid #E2DEED;
}

.log-view {
  padding: 12px 18px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  line-height: 1.75;
}
.ll { display: flex; gap: 8px; }
.ll .ts { color: #B4A4C0; flex-shrink: 0; }
.ll .msg { color: #4A3F6B; }
.ll.dim .msg { color: #9D95AD; }
.ll.ok  .msg { color: #0D9488; }
.ll.err .msg { color: #DC2626; }
.ll.warn .msg { color: #C96800; }

/* ── Footer ── */
.footer {
  border-top: 1px solid #E2DEED;
  flex-shrink: 0;
  height: 52px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: 6px;
  border: 1px solid;
  cursor: pointer;
  white-space: nowrap;
  line-height: 1.3;
  transition: all 0.1s;
}
.btn.violet { background: #7C3AED; border-color: transparent; color: white; }
.btn.violet:hover { background: #6D28D9; }
.btn.teal   { background: #0D9488; border-color: transparent; color: white; }
.btn.peach  { background: #EA580C; border-color: transparent; color: white; }
.btn.ghost  { background: transparent; border-color: #DDD9E8; color: #3D3647; }
.btn.ghost:hover { background: #F1EFF6; }
.btn .hk2 { font-family: 'IBM Plex Mono', monospace; font-size: 10px; opacity: 0.6; border: 1px solid currentColor; border-radius: 3px; padding: 1px 4px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-label">Mock D — Session Timeline</span>
  <button class="scenario-btn active" onclick="load(0)">Simple · 3 sessions</button>
  <button class="scenario-btn" onclick="load(1)">Complex · 9 sessions (review loops)</button>
</div>

<div class="drawer">
  <div class="drawer-header">
    <div class="header-row">
      <div class="task-title" id="taskTitle">—</div>
      <div class="close-btn"><span class="kbd">esc</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
    </div>
  </div>

  <div class="strip-wrap">
    <div class="strip" id="strip"></div>
  </div>

  <div class="ctx-bar" id="ctxBar"></div>

  <div class="tabs" id="tabs"></div>

  <div class="body" id="body"></div>

  <div class="footer" id="footer"></div>
</div>

<script>
// ── Stage palette ──────────────────────────────────────────
const P = {
  planning:  { c: '#EA580C', abbr: 'PLAN' },
  breakdown: { c: '#0D9488', abbr: 'BRKD' },
  work:      { c: '#7C3AED', abbr: 'WORK' },
  review:    { c: '#1D64D8', abbr: 'REV'  },
  checks:    { c: '#D97706', abbr: 'CHCK' },
  compound:  { c: '#6B6279', abbr: 'COMP' },
};

const G = { done: '✓', rejected: '✗', current: '→' };

// ── Scenarios ────────────────────────────────────────────────
const SCENARIOS = [
  // 0 — Simple: plan → work → review (awaiting)
  {
    title: 'Add OAuth login flow',
    sessions: [
      {
        stage: 'planning', outcome: 'done',
        tabs: ['artifact','logs'],
        artifact: `<div class="prose">
          <h3>Implementation Plan: OAuth Login</h3>
          <p>OAuth 2.0 with GitHub as the initial provider. PKCE flow — no client secrets in the browser. Redirect URIs configurable per environment.</p>
          <div class="gap"><h3>Key decisions</h3></div>
          <ul>
            <li>PKCE flow (no client secret exposure)</li>
            <li>Redirect URI from <code>OAUTH_REDIRECT_URI</code> env var</li>
            <li>Session-based token storage (not JWT)</li>
            <li>Graceful degradation if provider is down</li>
          </ul>
        </div>`,
        logs: `<div class="log-view">
          <div class="ll dim"><span class="ts">13:20:01</span><span class="msg">Planning stage started</span></div>
          <div class="ll dim"><span class="ts">13:20:03</span><span class="msg">Reading task description…</span></div>
          <div class="ll ok"><span class="ts">13:24:18</span><span class="msg">Plan complete ✓</span></div>
          <div class="ll dim"><span class="ts">13:24:19</span><span class="msg">Submitting for approval</span></div>
        </div>`,
      },
      {
        stage: 'work', outcome: 'rejected',
        tabs: ['artifact','logs'],
        artifact: `<div class="prose">
          <h3>OAuth 2.0 Implementation — Attempt 1</h3>
          <p>Added GitHub OAuth callback handler and token exchange.</p>
          <ul>
            <li>Added <code>/auth/github/callback</code> route</li>
            <li>Redirect hardcoded to <code>http://localhost:3000</code></li>
            <li>Basic token exchange — no error handling</li>
            <li>Session updated with OAuth token</li>
          </ul>
        </div>`,
        logs: `<div class="log-view">
          <div class="ll dim"><span class="ts">13:30:04</span><span class="msg">Work session started</span></div>
          <div class="ll ok"><span class="ts">13:34:18</span><span class="msg">Callback handler implemented ✓</span></div>
          <div class="ll warn"><span class="ts">13:36:01</span><span class="msg">Skipping error handling</span></div>
          <div class="ll dim"><span class="ts">13:36:44</span><span class="msg">Submitting for review</span></div>
        </div>`,
      },
      {
        stage: 'review', outcome: 'current',
        tabs: ['review','logs'],
        footer: { label: 'Approve', cls: 'violet', hotkey: 'a', right: { label: 'Reject', cls: 'ghost', hotkey: 'r' } },
        review: `<div class="review-card">
          <div class="review-verdict pend">→ Awaiting your decision</div>
          <div class="review-body">Two issues found: the redirect URI is hardcoded to localhost (will break in staging and production — needs to come from env config), and there's no error handling if GitHub is unavailable. Users would see a 500 error.</div>
          <div class="review-meta">Session 3 of 3 · Iteration 1 of work</div>
        </div>`,
        logs: `<div class="log-view">
          <div class="ll dim"><span class="ts">13:40:01</span><span class="msg">Review session started</span></div>
          <div class="ll dim"><span class="ts">13:40:03</span><span class="msg">Reading work artifact…</span></div>
          <div class="ll"><span class="ts">13:41:10</span><span class="msg">Identified 2 issues</span></div>
          <div class="ll dim"><span class="ts">13:41:24</span><span class="msg">Awaiting human decision</span></div>
        </div>`,
      },
    ]
  },

  // 1 — Complex: plan → break → work → review loops
  {
    title: 'Migrate billing system to Stripe',
    sessions: [
      {
        stage: 'planning', outcome: 'done',
        tabs: ['artifact','logs'],
        artifact: `<div class="prose">
          <h3>Migration Plan: Stripe Billing</h3>
          <p>Migrate from legacy payment processor to Stripe. Maintain existing subscription tiers with zero-downtime cutover.</p>
          <div class="gap"><h3>Components</h3></div>
          <ul>
            <li>Stripe SDK + secrets management</li>
            <li>Subscription sync and charge endpoints</li>
            <li>Webhook handler for payment events</li>
            <li>Batch migration script for existing customers</li>
          </ul>
        </div>`,
        logs: `<div class="log-view">
          <div class="ll ok"><span class="ts">10:00:04</span><span class="msg">Planning complete ✓</span></div>
        </div>`,
      },
      {
        stage: 'breakdown', outcome: 'done',
        tabs: ['artifact','logs'],
        artifact: `<div class="prose">
          <h3>Initial Breakdown — 3 subtasks</h3>
          <ul>
            <li><strong>Stripe SDK setup</strong> — install, configure, add keys</li>
            <li><strong>Payment endpoints</strong> — charge, refund, subscriptions</li>
            <li><strong>Customer migration</strong> — batch migrate billing records</li>
          </ul>
          <p class="gap" style="color:#9D95AD; font-size:12px; font-family:'IBM Plex Mono',monospace">Note: this breakdown was later revised — see session 5</p>
        </div>`,
        logs: `<div class="log-view">
          <div class="ll ok"><span class="ts">10:10:04</span><span class="msg">Breakdown complete ✓</span></div>
        </div>`,
      },
      {
        stage: 'work', outcome: 'rejected',
        tabs: ['artifact','logs'],
        artifact: `<div class="prose">
          <h3>Stripe Integration — Attempt 1</h3>
          <p>SDK installed. Basic charge and subscription endpoints added.</p>
          <ul>
            <li>Stripe SDK installed — API key hardcoded in source</li>
            <li>Charge and subscription endpoints working</li>
            <li>Migration script written — untested, no rollback</li>
          </ul>
        </div>`,
        logs: `<div class="log-view">
          <div class="ll ok"><span class="ts">10:28:44</span><span class="msg">Stripe SDK configured ✓</span></div>
          <div class="ll warn"><span class="ts">10:31:01</span><span class="msg">Migration tests skipped</span></div>
        </div>`,
      },
      {
        stage: 'review', outcome: 'rejected',
        tabs: ['review','logs'],
        review: `<div class="review-card">
          <div class="review-verdict rej">✗ Rejected — sent back to breakdown</div>
          <div class="review-body">Structural problems: API key is hardcoded (critical security issue), migration script has no rollback plan (risky), and the breakdown missed webhook handling entirely. Needs re-breakdown with webhooks as a first-class concern and proper secrets management before work continues.</div>
          <div class="review-meta">Rejected by christian · 14 Jan at 10:45 · Returned to breakdown</div>
        </div>`,
        logs: `<div class="log-view">
          <div class="ll err"><span class="ts">10:43:01</span><span class="msg">Review complete — rejected</span></div>
        </div>`,
      },
      {
        stage: 'breakdown', outcome: 'done',
        tabs: ['artifact','logs'],
        artifact: `<div class="prose">
          <h3>Revised Breakdown — 4 subtasks</h3>
          <ul>
            <li><strong>Secrets & config</strong> — env-based keys, rotation support</li>
            <li><strong>Payment endpoints</strong> — charge, refund, subscriptions</li>
            <li><strong>Webhook handler</strong> — payment events, retry, idempotency</li>
            <li><strong>Customer migration</strong> — tested batch script with rollback</li>
          </ul>
        </div>`,
        logs: `<div class="log-view">
          <div class="ll ok"><span class="ts">11:00:04</span><span class="msg">Revised breakdown complete ✓</span></div>
        </div>`,
      },
      {
        stage: 'work', outcome: 'rejected',
        tabs: ['artifact','logs'],
        artifact: `<div class="prose">
          <h3>Stripe Integration — Attempt 2</h3>
          <ul>
            <li>API keys from <code>STRIPE_SECRET_KEY</code> env var ✓</li>
            <li>Webhook handler added — no idempotency key checking</li>
            <li>Migration rollback via backup restore (not transactional)</li>
          </ul>
        </div>`,
        logs: `<div class="log-view">
          <div class="ll ok"><span class="ts">11:10:04</span><span class="msg">Env-based keys ✓</span></div>
          <div class="ll warn"><span class="ts">11:18:22</span><span class="msg">Webhook idempotency skipped</span></div>
        </div>`,
      },
      {
        stage: 'review', outcome: 'rejected',
        tabs: ['review','logs'],
        review: `<div class="review-card">
          <div class="review-verdict rej">✗ Rejected</div>
          <div class="review-body">Keys are now correct. Two remaining issues: webhook idempotency is not optional — Stripe replays events on network failure so duplicate charges are a real risk. The migration rollback also needs to be transactional, not backup-based. Fix those two and this is ready.</div>
          <div class="review-meta">Rejected by christian · 14 Jan at 11:35</div>
        </div>`,
        logs: `<div class="log-view">
          <div class="ll err"><span class="ts">11:33:01</span><span class="msg">Review complete — rejected</span></div>
        </div>`,
      },
      {
        stage: 'work', outcome: 'done',
        tabs: ['artifact','logs'],
        artifact: `<div class="prose">
          <h3>Stripe Integration — Attempt 3</h3>
          <ul>
            <li>Webhook idempotency via <code>stripe_event_id</code> dedup table ✓</li>
            <li>Migration rollback is transactional (wrapped in DB transaction) ✓</li>
            <li>All tests passing including webhook replay simulation ✓</li>
          </ul>
        </div>`,
        logs: `<div class="log-view">
          <div class="ll ok"><span class="ts">11:45:04</span><span class="msg">Webhook idempotency via dedup ✓</span></div>
          <div class="ll ok"><span class="ts">11:52:18</span><span class="msg">Transactional rollback ✓</span></div>
          <div class="ll ok"><span class="ts">11:54:01</span><span class="msg">All tests passing ✓</span></div>
        </div>`,
      },
      {
        stage: 'review', outcome: 'current',
        tabs: ['review','logs'],
        footer: { label: 'Approve', cls: 'violet', hotkey: 'a', right: { label: 'Reject', cls: 'ghost', hotkey: 'r' } },
        review: `<div class="review-card">
          <div class="review-verdict app">✓ Recommendation: approve</div>
          <div class="review-body">Idempotency correctly handled via the dedup table. Transactional rollback addresses the migration safety concern. Code quality is good, tests are comprehensive. Both previously identified issues are resolved.</div>
          <div class="review-meta">Session 9 of 9 · Awaiting your decision</div>
        </div>`,
        logs: `<div class="log-view">
          <div class="ll ok"><span class="ts">12:03:44</span><span class="msg">All prior issues resolved ✓</span></div>
          <div class="ll dim"><span class="ts">12:03:46</span><span class="msg">Awaiting human decision</span></div>
        </div>`,
      },
    ]
  },
];

// ── State ─────────────────────────────────────────────────────
let scenario = 0;
let selIdx = 0;
let selTab = 0;

function sessions() { return SCENARIOS[scenario].sessions; }
function sel() { return sessions()[selIdx]; }

// ── Render strip ──────────────────────────────────────────────
function renderStrip() {
  const strip = document.getElementById('strip');
  strip.innerHTML = '';
  sessions().forEach((s, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'connector';
      strip.appendChild(conn);
    }
    const p = P[s.stage];
    const isCurrentOutcome = s.outcome === 'current';
    const isSel = i === selIdx;
    const cls = ['chip', s.outcome, isSel && !isCurrentOutcome ? 'sel' : ''].filter(Boolean).join(' ');

    const chip = document.createElement('div');
    chip.className = cls;
    chip.style.setProperty('--c', isCurrentOutcome ? p.c : p.c);
    chip.innerHTML = `<span class="chip-name">${p.abbr}</span><span class="chip-glyph">${G[s.outcome] || '·'}</span>`;
    chip.addEventListener('click', () => { selIdx = i; selTab = 0; render(); });
    strip.appendChild(chip);
  });

  // Scroll selected into view
  const chips = strip.querySelectorAll('.chip');
  chips[selIdx]?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// ── Render context bar ────────────────────────────────────────
function renderCtx() {
  const s = sel();
  const p = P[s.stage];
  const stageName = s.stage.charAt(0).toUpperCase() + s.stage.slice(1);
  const isCurrent = s.outcome === 'current';
  const tagCls = isCurrent ? 'current' : s.outcome === 'rejected' ? 'rejected' : 'done';
  const tagLabel = isCurrent ? 'Current' : s.outcome === 'rejected' ? 'Rejected' : 'Past';
  const back = !isCurrent ? `<span class="ctx-back" id="backBtn">← Current</span>` : '';

  document.getElementById('ctxBar').innerHTML = `
    <div class="ctx-dot" style="background:${p.c}"></div>
    <span class="ctx-stage" style="color:${p.c}">${stageName}</span>
    <span class="ctx-meta">· Session ${selIdx + 1} of ${sessions().length}</span>
    <span class="ctx-tag ${tagCls}" style="--c:${p.c}">${tagLabel}</span>
    ${back}
  `;

  document.getElementById('backBtn')?.addEventListener('click', () => {
    selIdx = sessions().length - 1; selTab = 0; render();
  });
}

// ── Render tabs ───────────────────────────────────────────────
function renderTabs() {
  const s = sel();
  const p = P[s.stage];
  const tc = s.outcome === 'rejected' ? '#DC2626' : p.c;

  const tabsEl = document.getElementById('tabs');
  tabsEl.style.setProperty('--tc', tc);
  tabsEl.innerHTML = '';

  s.tabs.forEach((t, i) => {
    const label = t.charAt(0).toUpperCase() + t.slice(1);
    const div = document.createElement('div');
    div.className = 'tab' + (i === selTab ? ' on' : '');
    div.innerHTML = `${label} <span class="hk">${t[0]}</span>`;
    div.addEventListener('click', () => { selTab = i; renderTabs(); renderBody(); });
    tabsEl.appendChild(div);
  });
}

// ── Render body ───────────────────────────────────────────────
function renderBody() {
  const s = sel();
  const tabKey = s.tabs[selTab];
  document.getElementById('body').innerHTML = s[tabKey] || '<div style="padding:20px;font-family:\'IBM Plex Mono\',monospace;font-size:11px;color:#9D95AD">No content.</div>';
}

// ── Render footer ─────────────────────────────────────────────
function renderFooter() {
  const s = sel();
  const el = document.getElementById('footer');
  if (!s.footer) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  const f = s.footer;
  el.innerHTML = `
    <button class="btn ${f.cls}">${f.label} <span class="hk2">${f.hotkey}</span></button>
    ${f.right ? `<button class="btn ${f.right.cls}">${f.right.label} <span class="hk2">${f.right.hotkey}</span></button>` : ''}
  `;
}

// ── Full render ───────────────────────────────────────────────
function render() {
  renderStrip();
  renderCtx();
  renderTabs();
  renderBody();
  renderFooter();
}

// ── Scenario loader ───────────────────────────────────────────
function load(idx) {
  scenario = idx;
  selIdx = SCENARIOS[idx].sessions.length - 1;
  selTab = 0;
  document.getElementById('taskTitle').textContent = SCENARIOS[idx].title;
  document.querySelectorAll('.scenario-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  render();
}

load(0);
</script>
</body>
</html>
