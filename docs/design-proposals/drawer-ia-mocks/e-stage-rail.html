<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock E — Stage Rail</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --violet:    #7c6ff7;
    --teal:      #2eb8a6;
    --blue:      #4a8ff5;
    --peach:     #e8856a;
    --green:     #4caf82;
    --amber:     #d4973b;
    --accent-2:  #c084fc;
    --border:    rgba(255,255,255,0.08);
    --border-mid: rgba(255,255,255,0.13);
    --text-0:    #f0eeff;
    --text-1:    #c8c4e8;
    --text-2:    #8a86aa;
    --text-3:    #5a5675;
    --surface-0: #0e0d16;
    --surface-1: #15131f;
    --surface-2: #1c1a2a;
    --surface-3: #252335;
    --surface-4: #2e2b42;
    --rail-w:    88px;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #080710;
    color: var(--text-0);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 80px;
    gap: 48px;
    min-height: 100vh;
  }

  h1 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
  }

  .scenarios {
    display: flex;
    gap: 40px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  .scenario-block {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  .scenario-label {
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── Drawer shell ── */
  .drawer {
    width: 560px;
    height: 620px;
    background: var(--surface-1);
    border: 1px solid var(--border-mid);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .drawer-header {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 12px;
  }

  .task-icon {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--violet);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }

  .task-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-0);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .phase-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 99px;
    flex-shrink: 0;
  }
  .phase-badge.awaiting { background: rgba(212,151,59,0.15); color: var(--amber); }
  .phase-badge.working  { background: rgba(76,175,130,0.15); color: var(--green); }
  .phase-badge.done     { background: rgba(124,111,247,0.15); color: var(--violet); }

  /* ── Body: rail + content ── */
  .drawer-body {
    flex: 1;
    min-height: 0;
    display: flex;
  }

  /* ── Stage Rail ── */
  .stage-rail {
    width: var(--rail-w);
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 12px 0;
    gap: 2px;
    overflow-y: auto;
  }

  .rail-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 9px 6px 8px;
    cursor: pointer;
    border-radius: 0;
    position: relative;
    transition: background 0.12s;
  }

  .rail-item:hover { background: var(--surface-2); }

  .rail-item.selected {
    background: var(--surface-3);
  }

  .rail-item.selected::after {
    content: '';
    position: absolute;
    right: 0;
    top: 6px;
    bottom: 6px;
    width: 2px;
    background: var(--violet);
    border-radius: 2px 0 0 2px;
  }

  .rail-icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    position: relative;
    flex-shrink: 0;
  }

  .rail-icon.done     { background: rgba(76,175,130,0.18); color: var(--green); }
  .rail-icon.active   { background: rgba(124,111,247,0.2); color: var(--violet); }
  .rail-icon.rejected { background: rgba(232,133,106,0.15); color: var(--peach); }
  .rail-icon.pending  { background: var(--surface-3); color: var(--text-3); }

  .rail-item.selected .rail-icon.done     { background: rgba(76,175,130,0.28); }
  .rail-item.selected .rail-icon.active   { background: rgba(124,111,247,0.3); }

  /* Iteration badge on icon */
  .iter-badge {
    position: absolute;
    top: -4px;
    right: -5px;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    background: var(--surface-4);
    border: 1px solid var(--border-mid);
    border-radius: 99px;
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    color: var(--text-2);
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .rail-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-3);
    text-align: center;
    white-space: nowrap;
  }

  .rail-item.selected .rail-label { color: var(--text-2); }

  /* connector line between items */
  .rail-connector {
    width: 1px;
    height: 8px;
    background: var(--border);
    align-self: center;
    margin: -4px 0;
  }

  /* ── Main content pane ── */
  .content-pane {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  /* Tab bar */
  .tab-bar {
    flex-shrink: 0;
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    gap: 0;
  }

  .tab-btn {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    padding: 10px 12px;
    border: none;
    background: none;
    cursor: pointer;
    position: relative;
    transition: color 0.12s;
    letter-spacing: 0.03em;
  }

  .tab-btn:hover { color: var(--text-1); }

  .tab-btn.active {
    color: var(--text-0);
  }

  .tab-btn.active::after {
    content: '';
    position: absolute;
    left: 8px; right: 8px; bottom: -1px;
    height: 1.5px;
    background: var(--violet);
    border-radius: 2px;
  }

  /* Past-session context bar */
  .past-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    background: rgba(124,111,247,0.06);
    border-bottom: 1px solid rgba(124,111,247,0.15);
    font-size: 11px;
    color: var(--text-2);
  }

  .past-bar-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--violet);
    opacity: 0.6;
    flex-shrink: 0;
  }

  .past-bar .jump-current {
    margin-left: auto;
    font-size: 10px;
    color: var(--violet);
    cursor: pointer;
    opacity: 0.8;
  }
  .past-bar .jump-current:hover { opacity: 1; }

  /* Content area */
  .content-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  /* Artifact content */
  .artifact-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .artifact-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-3);
  }

  .artifact-outcome {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    font-weight: 500;
  }
  .outcome-approved  { background: rgba(76,175,130,0.15); color: var(--green); }
  .outcome-rejected  { background: rgba(232,133,106,0.15); color: var(--peach); }
  .outcome-active    { background: rgba(124,111,247,0.15); color: var(--violet); }
  .outcome-pending   { background: rgba(90,86,117,0.3);    color: var(--text-3); }

  .iteration-note {
    font-size: 10px;
    color: var(--text-3);
    margin-left: auto;
  }

  .artifact-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .artifact-card p {
    font-size: 12px;
    line-height: 1.65;
    color: var(--text-1);
  }

  .artifact-card p + p { margin-top: 10px; }

  .artifact-card ul {
    list-style: none;
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .artifact-card li {
    font-size: 12px;
    color: var(--text-1);
    padding-left: 14px;
    position: relative;
    line-height: 1.5;
  }

  .artifact-card li::before {
    content: '–';
    position: absolute;
    left: 0;
    color: var(--text-3);
  }

  /* Rejection feedback card */
  .feedback-card {
    margin-top: 12px;
    background: rgba(232,133,106,0.06);
    border: 1px solid rgba(232,133,106,0.2);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .feedback-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--peach);
    opacity: 0.8;
    margin-bottom: 8px;
  }

  .feedback-card p {
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-2);
  }

  /* Logs placeholder */
  .log-lines {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    line-height: 1.7;
    color: var(--text-2);
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .log-line { display: flex; gap: 12px; }
  .log-ts { color: var(--text-3); flex-shrink: 0; }
  .log-msg { color: var(--text-2); }
  .log-msg.ok { color: var(--green); }
  .log-msg.warn { color: var(--amber); }

  /* Footer */
  .drawer-footer {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }

  .btn {
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    transition: opacity 0.12s;
  }
  .btn:hover { opacity: 0.85; }

  .btn-primary { background: var(--violet); color: #fff; }
  .btn-secondary { background: var(--surface-3); color: var(--text-1); }
  .btn-danger { background: rgba(232,133,106,0.15); color: var(--peach); border: 1px solid rgba(232,133,106,0.25); }

  .footer-spacer { flex: 1; }
  .footer-hint { font-size: 10px; color: var(--text-3); }
</style>
</head>
<body>

<h1>Mock E — Stage Rail</h1>

<div class="scenarios" id="root"></div>

<script>
// ── Stage data ────────────────────────────────────────────────────────────────

const SCENARIOS = [
  {
    label: "Simple — 4 stages, awaiting review",
    taskTitle: "Add markdown export to reports",
    phase: "Awaiting Review",
    phaseClass: "awaiting",
    stages: [
      {
        id: "planning",
        label: "Plan",
        icon: "◆",
        status: "done",
        iterations: 1,
        artifact: {
          outcome: "approved",
          text: [
            "Implement markdown export by adding a new `ExportService` class in `src/services/export.ts`. The service will convert the existing report data structure to CommonMark-compatible markdown using the `marked` library.",
            "Key decisions:",
          ],
          list: [
            "Use the existing `ReportFormatter` as the data source — no schema changes needed",
            "Output to user's Downloads folder by default, configurable via settings",
            "Tables rendered as GFM table syntax for compatibility with GitHub and Obsidian",
          ],
        },
        tabs: ["artifact"],
      },
      {
        id: "breakdown",
        label: "Brkd",
        icon: "⬡",
        status: "done",
        iterations: 1,
        artifact: {
          outcome: "approved",
          text: [
            "Broke down into 3 subtasks: (1) ExportService scaffolding, (2) markdown renderer, (3) download trigger + settings integration. All subtasks completed and integrated.",
          ],
        },
        tabs: ["artifact"],
      },
      {
        id: "work",
        label: "Work",
        icon: "◎",
        status: "done",
        iterations: 3,
        artifact: {
          outcome: "approved",
          text: [
            "Implemented `ExportService` with full markdown conversion. Handles nested tables, code blocks, and inline formatting. Added unit tests for all formatters.",
          ],
          list: [
            "`src/services/export.ts` — ExportService class (247 lines)",
            "`src/services/export.test.ts` — 18 unit tests, all passing",
            "`src/components/ReportActions.tsx` — export button wired up",
          ],
        },
        tabs: ["artifact", "logs"],
        iterHistory: [
          { n: 1, outcome: "rejected", feedback: "Table rendering breaks when cells contain line breaks. Also need to handle `null` values in numeric columns." },
          { n: 2, outcome: "rejected", feedback: "Null handling is fixed but table tests are still failing — `formatTable()` doesn't escape pipe characters inside cells." },
        ],
      },
      {
        id: "review",
        label: "Rev",
        icon: "◈",
        status: "active",
        iterations: 1,
        artifact: {
          outcome: "active",
          text: [
            "Implementation looks solid. The markdown output is clean and renders correctly in GitHub, Obsidian, and VS Code Preview. Test coverage is thorough.",
            "Minor concern: the download filename is always `report.md` — should we let users rename before saving, or at least include a timestamp?",
          ],
        },
        tabs: ["artifact", "logs"],
      },
    ],
    currentStage: "review",
    showFooter: true,
  },

  {
    label: "Complex — Work iterated 3×, on 2nd review",
    taskTitle: "Migrate auth to OAuth 2.0 + PKCE",
    phase: "Awaiting Review",
    phaseClass: "awaiting",
    stages: [
      {
        id: "planning",
        label: "Plan",
        icon: "◆",
        status: "done",
        iterations: 1,
        artifact: {
          outcome: "approved",
          text: ["Approved plan: replace session-based auth with OAuth 2.0 PKCE flow. Retain existing user table, add `oauth_tokens` table. Use `passport-oauth2` for provider integration."],
        },
        tabs: ["artifact"],
      },
      {
        id: "work",
        label: "Work",
        icon: "◎",
        status: "done",
        iterations: 3,
        artifact: {
          outcome: "approved",
          text: [
            "OAuth 2.0 PKCE flow fully implemented. Token refresh handled automatically. Session migration script included.",
          ],
          list: [
            "`src/auth/oauth.ts` — PKCE flow implementation",
            "`src/auth/token-store.ts` — encrypted token storage",
            "`migrations/V12__oauth_tokens.sql` — schema migration",
            "`src/auth/oauth.test.ts` — 24 tests passing",
          ],
        },
        tabs: ["artifact", "logs"],
        iterHistory: [
          { n: 1, outcome: "rejected", feedback: "PKCE verifier is being stored in localStorage — that's a security issue. Must use sessionStorage or a server-side session." },
          { n: 2, outcome: "rejected", feedback: "Token refresh race condition: if two requests fire simultaneously both trigger a refresh. Need a mutex or request deduplication." },
        ],
      },
      {
        id: "review",
        label: "Rev",
        icon: "◈",
        status: "active",
        iterations: 2,
        artifact: {
          outcome: "active",
          text: [
            "Security issues are resolved. PKCE verifier now lives in sessionStorage, token refresh uses a mutex via a promise queue. The implementation is solid.",
            "Approve pending final check on the migration script — want to verify the rollback path is safe.",
          ],
        },
        tabs: ["artifact", "logs"],
        iterHistory: [
          { n: 1, outcome: "rejected", feedback: "Migration script has no rollback. If the `oauth_tokens` table creation fails mid-migration, the `users` table is left in a partial state. Add a transaction wrapper." },
        ],
      },
    ],
    currentStage: "review",
    showFooter: true,
  },
];

// ── Render helpers ─────────────────────────────────────────────────────────────

function statusIcon(status) {
  if (status === "done")     return "✓";
  if (status === "active")   return "→";
  if (status === "rejected") return "✗";
  return "·";
}

function outcomeClass(outcome) {
  if (outcome === "approved") return "outcome-approved";
  if (outcome === "rejected") return "outcome-rejected";
  if (outcome === "active")   return "outcome-active";
  return "outcome-pending";
}

function outcomeLabel(outcome) {
  if (outcome === "approved") return "Approved";
  if (outcome === "rejected") return "Rejected";
  if (outcome === "active")   return "In Review";
  return "Pending";
}

function artifactHtml(stage, iterNum) {
  const art = stage.artifact;
  // Determine which iteration we're showing
  const isHistorical = iterNum !== undefined && iterNum < stage.iterations;
  const iterToShow = iterNum || stage.iterations;

  let historyOutcome = art.outcome;
  let feedback = null;

  if (isHistorical && stage.iterHistory) {
    const rec = stage.iterHistory.find(h => h.n === iterToShow);
    if (rec) {
      historyOutcome = rec.outcome;
      feedback = rec.feedback;
    }
  }

  const iterNote = stage.iterations > 1
    ? `Iteration ${iterToShow} of ${stage.iterations}`
    : "";

  return `
    <div class="artifact-meta">
      <span class="artifact-label">Artifact</span>
      <span class="artifact-outcome ${outcomeClass(historyOutcome)}">${outcomeLabel(historyOutcome)}</span>
      ${iterNote ? `<span class="iteration-note">${iterNote}</span>` : ""}
    </div>
    <div class="artifact-card">
      ${art.text.map(t => `<p>${t}</p>`).join("")}
      ${(art.list && !isHistorical) ? `<ul>${art.list.map(l => `<li>${l}</li>`).join("")}</ul>` : ""}
    </div>
    ${feedback ? `
    <div class="feedback-card">
      <div class="feedback-label">Rejection feedback</div>
      <p>${feedback}</p>
    </div>` : ""}
  `;
}

function logsHtml() {
  return `
    <div class="log-lines">
      <div class="log-line"><span class="log-ts">00:00</span><span class="log-msg">Starting agent session...</span></div>
      <div class="log-line"><span class="log-ts">00:02</span><span class="log-msg">Reading existing codebase structure</span></div>
      <div class="log-line"><span class="log-ts">00:18</span><span class="log-msg">Writing src/auth/oauth.ts</span></div>
      <div class="log-line"><span class="log-ts">00:45</span><span class="log-msg">Writing src/auth/token-store.ts</span></div>
      <div class="log-line"><span class="log-ts">01:12</span><span class="log-msg ok">Tests: 24 passed, 0 failed</span></div>
      <div class="log-line"><span class="log-ts">01:14</span><span class="log-msg">Generating artifact summary...</span></div>
      <div class="log-line"><span class="log-ts">01:16</span><span class="log-msg ok">Stage complete — artifact submitted</span></div>
    </div>
  `;
}

// ── Build drawer ───────────────────────────────────────────────────────────────

function buildDrawer(scenario) {
  const drawerId = `drawer-${Math.random().toString(36).slice(2)}`;

  // State
  let selectedStageId = scenario.currentStage;
  let selectedTab = null; // null = auto (first tab)
  let viewingIterN = null; // null = latest

  function getStage() {
    return scenario.stages.find(s => s.id === selectedStageId);
  }

  function effectiveTab(stage) {
    if (selectedTab && stage.tabs.includes(selectedTab)) return selectedTab;
    return stage.tabs[0];
  }

  function render() {
    const stage = getStage();
    const tab = effectiveTab(stage);
    const isPast = stage.status === "done" && stage.id !== scenario.currentStage;
    const iterN = viewingIterN;
    const showingOldIter = iterN !== null && iterN < stage.iterations;

    // Rail items
    const railItems = scenario.stages.map(s => {
      const isSelected = s.id === selectedStageId;
      return `
        <div class="rail-item ${isSelected ? "selected" : ""}"
             onclick="drawerState['${drawerId}'].selectStage('${s.id}')">
          <div class="rail-icon ${s.status}" style="position:relative">
            ${s.icon}
            ${s.iterations > 1 ? `<div class="iter-badge">×${s.iterations}</div>` : ""}
          </div>
          <div class="rail-label">${s.label}</div>
        </div>
        ${s !== scenario.stages[scenario.stages.length - 1] ? '<div class="rail-connector"></div>' : ""}
      `;
    }).join("");

    // Tabs
    const tabBar = stage.tabs.map(t => `
      <button class="tab-btn ${tab === t ? "active" : ""}"
              onclick="drawerState['${drawerId}'].selectTab('${t}')">
        ${t.charAt(0).toUpperCase() + t.slice(1)}
      </button>
    `).join("");

    // Iter selector strip (only if stage has multiple iterations)
    let iterStrip = "";
    if (stage.iterations > 1 && tab === "artifact") {
      const currentN = viewingIterN || stage.iterations;
      const pills = [];
      for (let i = 1; i <= stage.iterations; i++) {
        const active = i === currentN;
        const hist = stage.iterHistory && stage.iterHistory.find(h => h.n === i);
        const dot = hist ? (hist.outcome === "rejected" ? "✗" : "✓") : (i === stage.iterations ? "→" : "✓");
        pills.push(`
          <button onclick="drawerState['${drawerId}'].selectIter(${i})"
                  style="font-size:10px;padding:3px 9px;border-radius:99px;border:1px solid ${active ? "var(--violet)" : "var(--border)"};background:${active ? "rgba(124,111,247,0.15)" : "transparent"};color:${active ? "var(--violet)" : "var(--text-3)"};cursor:pointer;font-family:inherit;">
            ${dot} ${i}
          </button>
        `);
      }
      iterStrip = `
        <div style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-bottom:1px solid var(--border);background:var(--surface-2)">
          <span style="font-size:10px;color:var(--text-3);letter-spacing:.05em;text-transform:uppercase;margin-right:4px;">Iteration</span>
          ${pills.join("")}
        </div>
      `;
    }

    // Past-session bar
    const pastBar = isPast ? `
      <div class="past-bar">
        <div class="past-bar-dot"></div>
        <span>Viewing past session — ${stage.label} stage</span>
        <span class="jump-current" onclick="drawerState['${drawerId}'].selectStage('${scenario.currentStage}')">← Current ↗</span>
      </div>
    ` : "";

    // Body content
    let bodyContent = "";
    if (tab === "artifact") {
      bodyContent = artifactHtml(stage, iterN);
    } else if (tab === "logs") {
      bodyContent = logsHtml();
    }

    // Footer
    const footer = scenario.showFooter && stage.id === scenario.currentStage ? `
      <div class="drawer-footer">
        <button class="btn btn-danger">Reject</button>
        <div class="footer-spacer"></div>
        <span class="footer-hint">Review complete</span>
        <button class="btn btn-primary">Approve</button>
      </div>
    ` : "";

    const el = document.getElementById(drawerId);
    if (!el) return;

    el.innerHTML = `
      <div class="drawer-header">
        <div class="header-top">
          <div class="task-icon">T</div>
          <div class="task-title">${scenario.taskTitle}</div>
          <div class="phase-badge ${scenario.phaseClass}">${scenario.phase}</div>
        </div>
      </div>
      <div class="drawer-body">
        <div class="stage-rail">${railItems}</div>
        <div class="content-pane">
          <div class="tab-bar">${tabBar}</div>
          ${pastBar}
          ${iterStrip}
          <div class="content-body">${bodyContent}</div>
        </div>
      </div>
      ${footer}
    `;
  }

  return {
    render,
    selectStage(id) {
      selectedStageId = id;
      selectedTab = null;
      viewingIterN = null;
      render();
    },
    selectTab(t) {
      selectedTab = t;
      render();
    },
    selectIter(n) {
      viewingIterN = n;
      render();
    },
  };
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────

window.drawerState = {};

const root = document.getElementById("root");

SCENARIOS.forEach(scenario => {
  const block = document.createElement("div");
  block.className = "scenario-block";

  const label = document.createElement("div");
  label.className = "scenario-label";
  label.textContent = scenario.label;

  const drawerId = `drawer-${Math.random().toString(36).slice(2)}`;
  const drawerEl = document.createElement("div");
  drawerEl.className = "drawer";
  drawerEl.id = drawerId;

  block.appendChild(label);
  block.appendChild(drawerEl);
  root.appendChild(block);

  const state = buildDrawer(scenario);
  // Patch in the correct drawerId
  const stateWithId = {
    render: state.render,
    selectStage: state.selectStage,
    selectTab: state.selectTab,
    selectIter: state.selectIter,
  };

  // Re-build with correct id bound in closures
  // (simple approach: re-run buildDrawer with the real id)
  (function(id, scen) {
    let selectedStageId = scen.currentStage;
    let selectedTab = null;
    let viewingIterN = null;

    function getStage() { return scen.stages.find(s => s.id === selectedStageId); }
    function effectiveTab(stage) {
      if (selectedTab && stage.tabs.includes(selectedTab)) return selectedTab;
      return stage.tabs[0];
    }

    function render() {
      const stage = getStage();
      const tab = effectiveTab(stage);
      const isPast = stage.status === "done" && stage.id !== scen.currentStage;

      const railItems = scen.stages.map((s, si) => `
        <div class="rail-item ${s.id === selectedStageId ? "selected" : ""}"
             onclick="drawerState['${id}'].selectStage('${s.id}')">
          <div class="rail-icon ${s.status}" style="position:relative">
            ${s.icon}
            ${s.iterations > 1 ? `<div class="iter-badge">×${s.iterations}</div>` : ""}
          </div>
          <div class="rail-label">${s.label}</div>
        </div>
        ${si < scen.stages.length - 1 ? '<div class="rail-connector"></div>' : ""}
      `).join("");

      const tabBar = stage.tabs.map(t => `
        <button class="tab-btn ${tab === t ? "active" : ""}"
                onclick="drawerState['${id}'].selectTab('${t}')">
          ${t.charAt(0).toUpperCase() + t.slice(1)}
        </button>
      `).join("");

      let iterStrip = "";
      if (stage.iterations > 1 && tab === "artifact") {
        const currentN = viewingIterN || stage.iterations;
        const pills = [];
        for (let i = 1; i <= stage.iterations; i++) {
          const active = i === currentN;
          const hist = stage.iterHistory && stage.iterHistory.find(h => h.n === i);
          const isLatest = i === stage.iterations;
          const outcome = hist ? hist.outcome : (isLatest ? stage.artifact.outcome : "?");
          const dot = outcome === "rejected" ? "✗" : (outcome === "approved" || outcome === "active") ? (isLatest && stage.status === "active" ? "→" : "✓") : "·";
          pills.push(`
            <button onclick="drawerState['${id}'].selectIter(${i})"
                    style="font-size:10px;padding:3px 9px;border-radius:99px;border:1px solid ${active ? "var(--violet)" : "var(--border)"};background:${active ? "rgba(124,111,247,0.15)" : "transparent"};color:${active ? "var(--violet)" : "var(--text-3)"};cursor:pointer;font-family:inherit;font-weight:500;">
              ${dot} ${i}
            </button>
          `);
        }
        iterStrip = `
          <div style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-bottom:1px solid var(--border);background:var(--surface-2)">
            <span style="font-size:10px;color:var(--text-3);letter-spacing:.05em;text-transform:uppercase;margin-right:4px;">Iteration</span>
            ${pills.join("")}
          </div>
        `;
      }

      const pastBar = isPast ? `
        <div class="past-bar">
          <div class="past-bar-dot"></div>
          <span>Viewing past session — ${stage.label.toLowerCase()} stage</span>
          <span class="jump-current" onclick="drawerState['${id}'].selectStage('${scen.currentStage}')">← Current ↗</span>
        </div>
      ` : "";

      let bodyContent = "";
      if (tab === "artifact") bodyContent = artifactHtml(stage, viewingIterN);
      else if (tab === "logs") bodyContent = logsHtml();

      const footer = scen.showFooter && stage.id === scen.currentStage ? `
        <div class="drawer-footer">
          <button class="btn btn-danger">Reject</button>
          <div class="footer-spacer"></div>
          <button class="btn btn-primary">Approve</button>
        </div>
      ` : "";

      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = `
        <div class="drawer-header">
          <div class="header-top">
            <div class="task-icon">T</div>
            <div class="task-title">${scen.taskTitle}</div>
            <div class="phase-badge ${scen.phaseClass}">${scen.phase}</div>
          </div>
        </div>
        <div class="drawer-body">
          <div class="stage-rail">${railItems}</div>
          <div class="content-pane">
            <div class="tab-bar">${tabBar}</div>
            ${pastBar}
            ${iterStrip}
            <div class="content-body">${bodyContent}</div>
          </div>
        </div>
        ${footer}
      `;
    }

    window.drawerState[id] = {
      render,
      selectStage(sid) { selectedStageId = sid; selectedTab = null; viewingIterN = null; render(); },
      selectTab(t) { selectedTab = t; render(); },
      selectIter(n) { viewingIterN = n; render(); },
    };

    render();
  })(drawerId, scenario);
});
</script>
</body>
</html>
