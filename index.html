<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orkestra</title>
    <style>
      /* Skeleton loader styles - shown before React loads */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      .skeleton-loader {
        height: 100vh;
        width: 100vw;
        background: linear-gradient(to bottom right, #fafaf9, #f5f5f4);
        display: flex;
        flex-direction: column;
        padding: 1rem;
        gap: 1rem;
        font-family: system-ui, -apple-system, sans-serif;
      }
      
      .skeleton-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 0.5rem;
        flex-shrink: 0;
      }
      
      .skeleton-title {
        font-size: 1.125rem;
        font-weight: 600;
        color: #292524;
        font-family: system-ui, -apple-system, sans-serif;
      }
      
      .skeleton-panel {
        flex: 1;
        background: white;
        border-radius: 12px;
        box-shadow: 0px 0px 16px 4px rgb(0 0 0 / 0.1), 0px 0px 2px 1px rgb(0 0 0 / 0.02);
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      
      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      
      /* Dark mode */
      @media (prefers-color-scheme: dark) {
        .skeleton-loader {
          background: linear-gradient(to bottom right, #0c0a09, #1c1917);
        }
        
        .skeleton-title {
          color: #f5f5f4;
        }
        
        .skeleton-panel {
          background: #1c1917;
          box-shadow: 0px 0px 16px 4px rgb(0 0 0 / 0.3), 0px 0px 2px 1px rgb(0 0 0 / 0.1);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Skeleton loader - replaced by React when it loads -->
      <div class="skeleton-loader">
        <div class="skeleton-header">
          <h1 class="skeleton-title">Orkestra</h1>
        </div>
        <div class="skeleton-panel"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
