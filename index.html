<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orkestra</title>
    <style>
      /* Pre-React skeleton — matches FeedLoadingSkeleton exactly */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #fff;
      }

      .skeleton {
        height: 100vh;
        width: 100vw;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #fff;
        font-family: 'IBM Plex Sans', system-ui, sans-serif;
      }

      /* Header — matches FeedHeader */
      .skeleton-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        height: 44px;
        border-bottom: 1px solid #e5e4e2;
        background: #fff;
        flex-shrink: 0;
      }

      .skeleton-title {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #1a1714;
        user-select: none;
      }

      .skeleton-kbd {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        font-weight: 500;
        color: #a09b96;
        background: #f5f4f2;
        border: 1px solid #e5e4e2;
        border-radius: 4px;
        padding: 2px 6px;
        line-height: 1;
        user-select: none;
        opacity: 0.5;
      }

      /* Body — centered spinner */
      .skeleton-body {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #FAF8FC;
      }

      .skeleton-spinner {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid #e5e4e2;
        border-top-color: #6b6560;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Footer — matches FeedStatusLine */
      .skeleton-footer {
        height: 28px;
        border-top: 1px solid #e5e4e2;
        background: #fff;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Pre-React skeleton, replaced when React mounts -->
      <div class="skeleton">
        <div class="skeleton-header">
          <span class="skeleton-title">Orkestra</span>
          <kbd class="skeleton-kbd">cmd+k</kbd>
        </div>
        <div class="skeleton-body">
          <div class="skeleton-spinner"></div>
        </div>
        <div class="skeleton-footer"></div>
      </div>
    </div>
    <script>window.__htmlLoadTime = performance.now();</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
