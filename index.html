<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Orkestra</title>
    <style>
      /* Pre-React skeleton — matches FeedLoadingSkeleton exactly */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #FAF8FC;
      }

      .skeleton {
        height: 100vh;
        height: 100dvh;
        width: 100vw;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #FAF8FC;
        font-family: 'IBM Plex Sans', system-ui, sans-serif;
      }

      /* Header — matches FeedHeader */
      .skeleton-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        height: 44px;
        border-bottom: 1px solid #E4DFE9;
        background: #FFFFFF;
        flex-shrink: 0;
      }

      .skeleton-title {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #1C1820;
        user-select: none;
      }

      .skeleton-kbd {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        font-weight: 500;
        color: #9E96AC;
        background: #FAF8FC;
        border: 1px solid #E4DFE9;
        border-radius: 4px;
        padding: 2px 6px;
        line-height: 1;
        user-select: none;
        opacity: 0.5;
      }

      /* Body — centered spinner + status text */
      .skeleton-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #FAF8FC;
      }

      .skeleton-spinner {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid #E4DFE9;
        border-top-color: #7A7288;
        animation: spin 0.8s linear infinite;
      }

      .skeleton-status {
        font-size: 13px;
        color: #7A7288;
        user-select: none;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Footer — matches FeedStatusLine */
      .skeleton-footer {
        height: 28px;
        border-top: 1px solid #E4DFE9;
        background: #FFFFFF;
        flex-shrink: 0;
      }

      /* Dark mode — Forge dark tokens */
      @media (prefers-color-scheme: dark) {
        body {
          background: #13111A;
        }

        .skeleton {
          background: #13111A;
        }

        .skeleton-header {
          background: #1C1926;
          border-bottom-color: #2E2A3C;
        }

        .skeleton-title {
          color: #EDEBF0;
        }

        .skeleton-kbd {
          color: #544E66;
          background: #13111A;
          border-color: #2E2A3C;
        }

        .skeleton-body {
          background: #13111A;
        }

        .skeleton-spinner {
          border-color: #2E2A3C;
          border-top-color: #7B7490;
        }

        .skeleton-status {
          color: #7B7490;
        }

        .skeleton-footer {
          background: #1C1926;
          border-top-color: #2E2A3C;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Pre-React skeleton, replaced when React mounts -->
      <div class="skeleton">
        <div class="skeleton-header">
          <span class="skeleton-title">Orkestra</span>
          <kbd class="skeleton-kbd">cmd+k</kbd>
        </div>
        <div class="skeleton-body">
          <div class="skeleton-spinner"></div>
          <p class="skeleton-status">Loading Orkestra…</p>
        </div>
        <div class="skeleton-footer"></div>
      </div>
    </div>
    <script>window.__htmlLoadTime = performance.now();</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
